services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postgres-dev
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-speech_ai}
      POSTGRES_USER: ${DB_USERNAME:-speech_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-speech_pass}
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME:-speech_user} -d ${POSTGRES_DB:-speech_ai}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    container_name: redis
    image: redis:8.6.2-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Speaches (Whisper) ───────────────────────────────────────────────────────
  speaches:
    container_name: speaches
    # imagem com suporte a CUDA
    image: ghcr.io/speaches-ai/speaches:latest-cuda
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - speaches_models:/home/ubuntu/.cache/huggingface/hub
    environment:
      - DEFAULT_LANGUAGE=pt
    # suporte a GPU
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
    healthcheck:
      test: [ "CMD", "curl", "--fail", "http://0.0.0.0:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── SonarQube ───────────────────────────────────────────────────────────────────
  sonarqube:
    container_name: sonarqube
    image: sonarqube:latest
    restart: unless-stopped
    ports:
      - "9000:9000" # UI: http://localhost:9000 (admin/admin no primeiro acesso)
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_temp:/opt/sonarqube/temp
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/api/system/status" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  postgres_data_dev:
  speaches_models:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  sonarqube_temp:

networks:
  default:
    name: speech-ai-network