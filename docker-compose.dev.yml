services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postgres-dev
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-speech_ai}
      POSTGRES_USER: ${DB_USERNAME:-speech_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-speech_pass}
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME:-speech_user} -d ${POSTGRES_DB:-speech_ai}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:8.6.2-alpine
    container_name: redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Speaches (Whisper) ───────────────────────────────────────────────────────
  speaches:
    # imagem com suporte a CUDA
    image: ghcr.io/speaches-ai/speaches:latest-cuda
    container_name: speaches-dev
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - speaches_models:/home/ubuntu/.cache/huggingface/hub
    environment:
      - DEFAULT_LANGUAGE=pt
    # suporte a GPU
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
    healthcheck:
      test: [ "CMD", "curl", "--fail", "http://0.0.0.0:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Prometheus ────────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus-dev
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus-dev.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.enable-lifecycle'
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Grafana ────────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data_dev:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Zipkin ────────────────────────────────────────────────────────────────────
  zipkin:
    image: openzipkin/zipkin:latest
    container_name: zipkin-dev
    restart: unless-stopped
    ports:
      - "9411:9411"
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9411/health" ]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── SonarQube ───────────────────────────────────────────────────────────────────
  sonarqube:
    image: sonarqube:26.5.0.122743-community
    container_name: sonarqube
    restart: unless-stopped
    ports:
      - "9000:9000" # UI: http://localhost:9000 (admin/admin no primeiro acesso)
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_temp:/opt/sonarqube/temp
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/api/system/status" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  postgres_data_dev:
  speaches_models:
  grafana_data_dev:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  sonarqube_temp:

networks:
  default:
    name: speech-ai-network