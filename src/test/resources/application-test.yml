spring:
  config:
    activate:
      on-profile: test

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

  autoconfigure:
    exclude:
      - org.springframework.boot.amqp.autoconfigure.RabbitAutoConfiguration

speech:
  provider: speaches

logging:
  level:
    root: WARN
    com.erichiroshi: DEBUG
    io.github.resilience4j: DEBUG
