spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:tc:postgresql:16-alpine:///speech_ai_test
    username: test
    password: test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6379

app:
  speaches:
    base-url: http://localhost:8000
    model: Systran/faster-whisper-small
  cache:
    transcription-ttl: 1

logging:
  level:
    root: WARN
    com.erichiroshi: DEBUG
    io.github.resilience4j: DEBUG
