spring:
  config:
    activate:
      on-profile: dev
    import: optional:file:.env.dev[.properties]

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/speech_ai}
    username: ${DB_USERNAME:speech_user}
    password: ${DB_PASSWORD:speech_pass}

  jpa:
    properties:
      hibernate:
        format_sql: true
    show-sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  ai:
    openai:
      api-key: ${OPENAI_API_KEY:openai_key_dev}
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: ${OLLAMA_MODEL:llama3.2:1b}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,traces
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0
    export:
      zipkin:
        endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

app:
  speaches:
    base-url: ${SPEACHES_BASE_URL:http://localhost:8000}
    model: ${SPEACHES_MODEL:Systran/faster-whisper-small}
  cache:
    transcription-ttl: ${CACHE_TTL:1}
  openai:
    model: ${OPENAI_MODEL:whisper-1}

  analysis:
    ollama:
      model: ${OLLAMA_MODEL:llama3.2:1b}
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
    cache:
      summary-ttl: ${SUMMARY_TTL:72h}

speech:
  provider: ${SPEECH_PROVIDER:speaches}

resilience4j:
  circuitbreaker:
    instances:
      speaches:
        sliding-window-size: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
  retry:
    instances:
      speaches:
        max-attempts: 2
        wait-duration: 500ms

logging:
  level:
    com.erichiroshi: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    io.github.resilience4j: DEBUG
