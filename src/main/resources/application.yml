spring:
  application:
    name: speech-ai-hexagonal
  config:
    import: optional:file:.env[.properties]

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB

# ── Datasource ────────────────────────────────────────────────────────────
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000

# ── JPA ────────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
    show-sql: false
    open-in-view: false

# ── Flyway ────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

# ── Cache ────────────────────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      # timeout de conexão/leitura — falha rápida, não bloqueia o request
      connect-timeout: 2s
      timeout: 2s

# ── Server Port ────────────────────────────────────────────────────────────
server:
  port: 8080

# ── Management ────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when_authorized
  tracing:
    sampling:
      probability: 1.0
    export:
      zipkin:
        endpoint: ${ZIPKIN_ENDPOINT:http://zipkin:9411/api/v2/spans}
  metrics:
    tags:
      application: ${spring.application.name}

# ── App Config ────────────────────────────────────────────────────────────
app:
  speaches:
    base-url: ${SPEACHES_BASE_URL:http://localhost:8000}
    model: ${SPEACHES_MODEL:Systran/faster-whisper-small}
  cache:
    transcription-ttl: ${CACHE_TTL:24}

# ── Resilience4j ────────────────────────────────────────────────────────
resilience4j:
  circuitbreaker:
    instances:
      speaches:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        failure-rate-threshold: 50
        slow-call-rate-threshold: 80
        slow-call-duration-threshold: 10s
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true
        record-exceptions:
          - com.erichiroshi.speechaihexagonal.transcription.domain.exception.SpeechToTextException
          - org.springframework.web.client.RestClientException
          - java.io.IOException
          - java.util.concurrent.TimeoutException

  retry:
    instances:
      speaches:
        max-attempts: 3
        wait-duration: 1s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - org.springframework.web.client.ResourceAccessException
          - java.io.IOException
          - java.util.concurrent.TimeoutException
        ignore-exceptions:
          - com.erichiroshi.speechaihexagonal.transcription.domain.exception.SpeechToTextException

  bulkhead:
    instances:
      speaches:
        max-concurrent-calls: 10
        max-wait-duration: 0ms

# ── Logging ────────────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.erichiroshi: INFO