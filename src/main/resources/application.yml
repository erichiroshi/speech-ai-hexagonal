spring:
  application:
    name: speech-ai-hexagonal
  config:
    import: optional:file:.env[.properties]

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB

# ── Datasource ────────────────────────────────────────────────────────────
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000

# ── JPA ────────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
    show-sql: false
    open-in-view: false

# ── Flyway ────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

# ── Cache ────────────────────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      # timeout de conexão/leitura — falha rápida, não bloqueia o request
      connect-timeout: 2s
      timeout: 2s

# ── Server Port ────────────────────────────────────────────────────────────
server:
  port: 8080

# ── Management ────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

# ── App Config ────────────────────────────────────────────────────────────
app:
# ── Speaches ────────────────────────────────────────────────────────────
  speaches:
    base-url: ${SPEACHES_BASE_URL}
    model: ${SPEACHES_MODEL}
# ── Cache  ────────────────────────────────────────────────────────────
  cache:
    transcription-ttl: ${CACHE_TTL:24}

# ── Logging ────────────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.erichiroshi: INFO
