spring:
  application:
    name: speech-ai-hexagonal
  config:
    import: optional:file:.env[.properties]

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB

  # ── Datasource ────────────────────────────────────────────────────────────
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000

  # ── JPA ────────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
    show-sql: false
    open-in-view: false

  # ── Flyway ────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  # ── Cache ────────────────────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      # timeout de conexão/leitura — falha rápida, não bloqueia o request
      connect-timeout: 2s
      timeout: 2s

  # ── RabbitMQ ──────────────────────────────────────────────────────────────────
  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}
    listener:
      simple:
        retry:
          enabled: true
          initial-interval: 1s
          multiplier: 2
          max-interval: 10s
          max-attempts: 3
        acknowledge-mode: auto

  # ── Spring Mail (SMTP) ────────────────────────────────────────────────────────
  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER:}
    password: ${SMTP_PASS:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # ── Ollama LLM ────────────────────────────────────────────────────────────────────
  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://ollama:11434}
      chat:
        options:
          model: ${OLLAMA_MODEL}
    openai:
      api-key: ${OPENAI_API_KEY}

# ── Server Port ────────────────────────────────────────────────────────────
server:
  port: 8080

# ── Management ────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when_authorized
  tracing:
    sampling:
      probability: 1.0
    export:
      zipkin:
        endpoint: ${ZIPKIN_ENDPOINT:http://zipkin:9411/api/v2/spans}
  metrics:
    tags:
      application: ${spring.application.name}

# ── App Config ────────────────────────────────────────────────────────────
app:
  speaches:
    base-url: ${SPEACHES_BASE_URL:http://localhost:8000}
    model: ${SPEACHES_MODEL:Systran/faster-whisper-small}
  cache:
    transcription-ttl: ${CACHE_TTL:24}
  openai:
    model: ${OPENAI_MODEL:whisper-1}

  analysis:
    ollama:
      model: ${OLLAMA_MODEL}
      base-url: ${OLLAMA_BASE_URL:http://ollama:11434}
    cache:
      summary-ttl: ${SUMMARY_TTL:72h}

  notification:
    email-recipient: ${NOTIFICATION_EMAIL:}
    sms-recipient: ${NOTIFICATION_SMS_NUMBER:}
    whatsapp-recipient: ${NOTIFICATION_WHATSAPP_NUMBER:}
    no_opRecipient: ${NOTIFICATION_NO_OP_EMAIL:no_op@speech-ai.com}
    channels:
      email: ${NOTIFICATION_EMAIL_ENABLED:false}
      sms: ${NOTIFICATION_SMS_ENABLED:false}
      whatsapp: ${NOTIFICATION_WA_ENABLED:false}
      no_op: ${NOTIFICATION_NO_OP_ENABLED:true}
    email:
      from: ${NOTIFICATION_EMAIL_FROM:noreply@speech-ai.com}
    sms:
      provider-url: ${SMS_PROVIDER_URL:}
      api-key: ${SMS_API_KEY:}
      from-number: ${SMS_FROM_NUMBER:}
    whatsapp:
      provider-url: ${WA_PROVIDER_URL:}
      api-key: ${WA_API_KEY:}
      from-number: ${WA_FROM_NUMBER:}
      phone-number-id: ${WA_PHONE_NUMBER_ID:}

# ── Speech Provider ───────────────────────────────────────────────────────────
# speaches → Whisper local via Speaches (padrão, requer GPU)
# openai → OpenAI Whisper-1 cloud (requer OPENAI_API_KEY)
speech:
  provider: ${SPEECH_PROVIDER:speech}

# ── Resilience4j ────────────────────────────────────────────────────────
resilience4j:
  circuitbreaker:
    instances:
      speaches:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        failure-rate-threshold: 50
        slow-call-rate-threshold: 80
        slow-call-duration-threshold: 10s
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true
        record-exceptions:
          - org.springframework.web.client.RestClientException
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - com.erichiroshi.speechaihexagonal.transcription.domain.exception.SpeechToTextException

  retry:
    instances:
      speaches:
        max-attempts: 3
        wait-duration: 1s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - org.springframework.web.client.ResourceAccessException
          - java.io.IOException
          - java.util.concurrent.TimeoutException
        ignore-exceptions:

  bulkhead:
    instances:
      speaches:
        max-concurrent-calls: 10
        max-wait-duration: 0ms

# ── Logging ────────────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.erichiroshi: INFO