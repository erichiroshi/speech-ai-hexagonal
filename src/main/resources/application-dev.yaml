spring:
  config:
    activate:
      on-profile: dev
    import: optional:file:.env.dev[.properties]

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/speech_ai}
    username: ${DB_USERNAME:speech_user}
    password: ${DB_PASSWORD:speech_pass}

  jpa:
    properties:
      hibernate:
        format_sql: true
    show-sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      # timeout de conexão/leitura — falha rápida, não bloqueia o request
      connect-timeout: 2s
      timeout: 2s

management:
  endpoints:
    web:
      exposure:
        include: health,info,env,beans
  endpoint:
    health:
      show-details: always

app:
  speaches:
    base-url: ${SPEACHES_BASE_URL:http://localhost:8000}
    model: ${SPEACHES_MODEL:Systran/faster-whisper-small}
  cache:
    transcription:
      ttl-hours: ${CACHE_TTL_HOURS:1}

logging:
  level:
    com.erichiroshi: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
