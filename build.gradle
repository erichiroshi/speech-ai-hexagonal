plugins {
    id 'java'
    id 'org.springframework.boot' version '4.0.6'
    id 'io.spring.dependency-management' version '1.1.7'

    id("io.freefair.lombok") version "9.5.0"
    id "org.sonarqube" version "7.3.0.8198"
    id 'jacoco'
}

group = 'com.erichiroshi'
version = '2.5.0'
description = 'Serviço de transcrição de áudio com análise inteligente via LLM'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

repositories {
    mavenCentral()
}

ext {
    mapstructVersion = '1.7.0.Beta1'
    okhttpVersion = '5.3.2'
}

dependencies {
    implementation 'org.springframework.boot:spring-boot-starter-webmvc'
    implementation 'org.springframework.boot:spring-boot-starter-actuator'

    //Mapstruct
    implementation "org.mapstruct:mapstruct:${mapstructVersion}"
    annotationProcessor "org.mapstruct:mapstruct-processor:${mapstructVersion}"
    testAnnotationProcessor "org.mapstruct:mapstruct-processor:${mapstructVersion}"

    // Test
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
    testImplementation 'org.springframework.boot:spring-boot-starter-webmvc-test'

    // MockWebServer para simular o Speaches (Whisper) nos testes
    testImplementation 'com.squareup.okhttp3:mockwebserver'
}

dependencyManagement {
    imports {
        mavenBom "com.squareup.okhttp3:okhttp-bom:${okhttpVersion}"
    }
}

ext{
    coverageExclusions = [
            '**/config/**',
            '**/dto/**',
            '**/mapper/**',
            '**/*Application*',
    ]
}

// ── Jacoco ─────────────────────────────────────────────────────────────
jacocoTestReport {
    reports {
        xml.required  = true   // consumido pelo SonarCloud e Codecov
        html.required = true   // leitura local em build/reports/jacoco/
    }
    afterEvaluate {
        classDirectories.setFrom(files(classDirectories.files.collect {
            fileTree(dir: it, exclude:
                    coverageExclusions
            )
        }))
    }
}

jacocoTestCoverageVerification {
    violationRules {
        rule {
            limit { minimum = 0.60 }
        }
    }
}

// ── Sonar ─────────────────────────────────────────────────────────────
sonar {
    properties {
        property "sonar.projectKey", "erichiroshi_speech-ai-hexagonal"
        property "sonar.organization", "erichiroshi"
        property 'sonar.exclusions', coverageExclusions.join(',')
    }
}

// ── Tasks ─────────────────────────────────────────────────────────────
tasks.named('sonar') {
    dependsOn tasks.named('jacocoTestReport')
}
tasks.named('jacocoTestReport') {
    dependsOn tasks.named('test')
}
tasks.named('test') {
    useJUnitPlatform()
}
