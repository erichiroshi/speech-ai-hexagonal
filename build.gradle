plugins {
    id 'java'
    id 'org.springframework.boot' version '4.0.6'
    id 'io.spring.dependency-management' version '1.1.7'

    id("io.freefair.lombok") version "9.5.0"
    id "org.sonarqube" version "7.3.0.8198"
    id 'jacoco'
}

group = 'com.erichiroshi'
version = '10.2.0'
description = 'Serviço de transcrição de áudio com análise inteligente via LLM'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

repositories {
    mavenCentral()
}

ext {
    aopVersion = '3.5.13'
    resilience4jVersion = '2.4.0'
    logbackencoderVersion = '9.0'
    springAiVersion = '2.0.0-M5'
}

dependencies {
    implementation 'org.springframework.boot:spring-boot-starter-webmvc'
    implementation 'org.springframework.boot:spring-boot-starter-actuator'

    // Persistência
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    runtimeOnly 'org.postgresql:postgresql'
    implementation 'org.springframework.boot:spring-boot-starter-flyway'
    implementation 'org.flywaydb:flyway-database-postgresql'

    // Cache
    implementation 'org.springframework.boot:spring-boot-starter-data-redis'

    //RabbitMQ
    implementation 'org.springframework.boot:spring-boot-starter-amqp'

    // Resiliência
    implementation "org.springframework.boot:spring-boot-starter-aop:${aopVersion}"
    implementation "io.github.resilience4j:resilience4j-spring-boot4:${resilience4jVersion}"

    // Observabilidade
    implementation 'io.micrometer:micrometer-registry-prometheus'
    implementation 'io.micrometer:micrometer-tracing-bridge-otel'
    implementation 'io.opentelemetry:opentelemetry-exporter-zipkin'
    implementation 'org.springframework.boot:spring-boot-starter-zipkin'

    // Logs estruturados
    implementation "net.logstash.logback:logstash-logback-encoder:${logbackencoderVersion}"

    // Spring AI — OpenAI (áudio/transcrição)
    implementation platform("org.springframework.ai:spring-ai-bom:${springAiVersion}")
    implementation 'org.springframework.ai:spring-ai-starter-model-openai'
    implementation 'org.springframework.ai:spring-ai-starter-model-ollama'

    // Test
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'org.springframework.boot:spring-boot-starter-webmvc-test'
    testImplementation 'org.springframework.boot:spring-boot-starter-data-jpa-test'
    implementation platform('org.testcontainers:testcontainers-bom:2.0.5')
    testImplementation 'org.testcontainers:testcontainers-junit-jupiter'
    testImplementation 'org.testcontainers:testcontainers-postgresql'
    testImplementation 'com.redis:testcontainers-redis'
    testImplementation 'org.springframework.boot:spring-boot-starter-data-redis-test'
    testImplementation 'org.wiremock:wiremock-standalone:3.13.0'
    testImplementation 'org.awaitility:awaitility:4.3.0'
    implementation platform('com.squareup.okhttp3:okhttp-bom:5.3.2')
    testImplementation 'com.squareup.okhttp3:mockwebserver'
    testImplementation 'com.tngtech.archunit:archunit-junit5:1.4.2'
    testImplementation 'org.testcontainers:testcontainers-rabbitmq'
}

ext {
    coverageExclusions = ['**/config/**',
                          '**/*Config*',
                          '**/dto/**',
                          '**/*Application*',
                          '**/input**', '**/output**',
                          '**/response**',
                          '**/exception/**',
                          '**/*Entity*',
                          '**/*Properties*']
}

// ── Jacoco ─────────────────────────────────────────────────────────────
jacocoTestReport {
    reports {
        xml.required = true
        html.required = true
    }
    afterEvaluate {
        classDirectories.setFrom(files(classDirectories.files.collect {
            fileTree(dir: it, exclude: coverageExclusions)
        }))
    }
}

jacocoTestCoverageVerification {
    violationRules {
        rule {
            limit { minimum = 0.70 }
        }
    }
}

// ── Sonar ─────────────────────────────────────────────────────────────
sonar {
    properties {
        property "sonar.projectKey", "erichiroshi_speech-ai-hexagonal"
        property "sonar.organization", "erichiroshi"
        property 'sonar.exclusions', coverageExclusions.join(',')
    }
}

// ── Tasks ─────────────────────────────────────────────────────────────
tasks.named('sonar') {
    dependsOn tasks.named('jacocoTestReport')
}
tasks.named('jacocoTestReport') {
    dependsOn tasks.named('test')
}
tasks.named('test') {
    useJUnitPlatform()
    jvmArgs '-XX:+EnableDynamicAgentLoading'
}
